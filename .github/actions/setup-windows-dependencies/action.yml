name: "Setup Windows Dependencies"
description: "Downloads, extracts, and prepares Windows dependencies exported by vcpkg from a workflow artifact."
inputs:
  artifact_name:
    description: "Name of the artifact to download"
    required: false
    default: "vcpkg-dependencies"
runs:
  using: "composite"
  steps:
    - name: List workflow run artifacts
      id: artifact_list
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        curl -sSL -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${{ github.repository }}/actions/artifacts" \
          > artifacts.json
        ARTIFACT_ID=$(jq '.artifacts[] | select(.name == "${{ inputs.artifact_name }}") | .id' artifacts.json | head -n1)
        echo "ARTIFACT_ID=$ARTIFACT_ID" >> $GITHUB_ENV

    - name: Download vcpkg-dependencies artifact zip
      if: env.ARTIFACT_ID != ''
      shell: bash
      env:
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        curl -L -H "Authorization: Bearer $GITHUB_TOKEN" \
          -H "Accept: application/vnd.github+json" \
          -o deps.zip \
          "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${ARTIFACT_ID}/zip"

    - name: Unzip vcpkg-dependencies artifact
      if: env.ARTIFACT_ID != ''
      shell: bash
      run: |
        mkdir -p down
        unzip deps.zip -d down

    - name: Unzip actual vcpkg export
      if: env.ARTIFACT_ID != ''
      shell: bash
      run: |
        mkdir -p deps/exported
        export_zip=$(find down -name 'vcpkg-export-*.zip' | head -n1)
        if [ -n "$export_zip" ]; then
          unzip "$export_zip" -d deps/exported
        fi
        mv deps/exported/vcpkg-export-*/* deps/exported/ || true
        touch deps/exported/.vcpkg-root
