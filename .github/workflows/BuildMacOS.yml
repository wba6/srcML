---
name: Build

on: workflow_dispatch

jobs:
  build:
    strategy:
      matrix:
        os: [macos-15]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 4.0

      - name: Configure
        shell: bash
        run: |
          cmake --preset ci-macos

      - name: Build
        shell: bash
        run: |
          cmake --build --preset ci-macos

      - name: Package
        shell: bash
        run: |
          cd ../srcML-build
          cpack

      - name: Install
        shell: bash
        run: |
          cmake --build --target install_package

      - name: Run Installed srcml
        shell: bash
        run: |
          srcml --version
          srcml --text="int a;" -l C++

      - name: Test client
        working_directory: ../srcML-build
        shell: bash
        run: |
          ctest -R ^srcml

      - name: Test libsrcml
        working_directory: ../srcML-build
        shell: bash
        run: |
          ctest -R ^libsrcml

      - name: Test parser
        working_directory: ../srcML-build
        shell: bash
        run: |
          ninja run_parser_tests
