---
name: Build macOS

on: workflow_dispatch

jobs:
  build:
    strategy:
      matrix:
        os: [macos-15]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: 4.0

      - name: Configure
        shell: bash
        run: |
          cmake --preset ci-macos

      - name: Build
        shell: bash
        run: |
          cmake --build --preset ci-macos

      - name: Package
        shell: bash
        run: |
          cd ../srcML-build
          cpack

      - name: Install
        shell: bash
        run: |
          cmake --build ../srcML-build --target install_package

      - name: Find and add srcml to PATH
        shell: bash
        run: |
          ls -lh hR
          SRCPATH=$(find $HOME -type f -name srcml | head -n1 | xargs dirname)
          echo "$SRCPATH" >> $GITHUB_PATH
          echo "SRCPATH: $SRCPATH"

      - name: Run Installed srcml
        shell: bash
        run: |
          srcml --version
          srcml --text="int a;" -l C++

      - name: Test client
        working-directory: ../srcML-build
        continue-on-error: true
        shell: bash
        run: |
          ctest -R ^srcml -VV

      - name: Test libsrcml
        working-directory: ../srcML-build
        continue-on-error: true
        shell: bash
        run: |
          ctest -R ^libsrcml -VV

      - name: Test parser
        working-directory: ../srcML-build
        continue-on-error: true
        shell: bash
        run: |
          ninja run_parser_tests

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: installers
          path: build/dist/*.pkg
