---
name: Test Client

on: workflow_dispatch

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      # - name: Cache Build
      #   id: cache
      #   uses: actions/cache@v4
      #   with:
      #     path: build
      #     key: ${{ runner.os }}-client1

      - name: Setup Ubuntu
        shell: bash
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt update
          sudo apt install curl zip g++ make ninja-build antlr libantlr-dev \
                           libxml2-dev libxml2-utils libxslt1-dev \
                           libarchive-dev libssl-dev libcurl4-openssl-dev \
                           cpio man file dpkg-dev
                           
      - name: Setup macOS
        shell: bash
        if: ${{ matrix.os == 'macos-latest' }}
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-path
          brew update
          brew reinstall ninja
          brew install libxml2 libxslt antlr libarchive zip cpio p7zip xz bzip2 curl

      - name: Setup Windows
        uses: microsoft/setup-msbuild@v1
        if: ${{ matrix.os == 'windows-latest' }}

      - name: Create build directory
        shell: bash
        if: ${{ !steps.cache.outputs.cache-hit }}
        run: mkdir build

      - name: Configure on Ubuntu
        shell: bash
        if: ${{ matrix.os == 'ubuntu-latest' && !steps.cache.outputs.cache-hit }}
        run: |
          cmake --preset ci-ubuntu -B build
          
      - name: Configure on macOS
        shell: bash
        if: ${{ matrix.os == 'macos-latest' && !steps.cache.outputs.cache-hit }}
        run: |
          unset CPATH C_INCLUDE_PATH CPLUS_INCLUDE_PATH SDKROOT DEVELOPER_DIR PKG_CONFIG_PATH

          # Set environment variables as a best practice
          export PKG_CONFIG_PATH="$(brew --prefix libxml2)/lib/pkgconfig:$(brew --prefix libxslt)/lib/pkgconfig:$(brew --prefix libarchive)/lib/pkgconfig:$(brew --prefix curl)/lib/pkgconfig"
          export CMAKE_PREFIX_PATH="$(brew --prefix libxml2);$(brew --prefix libxslt);$(brew --prefix libarchive);$(brew --prefix curl);/opt/homebrew"

          # Manually force all keg-only library paths AND the version for libarchive
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_PREFIX_PATH="${CMAKE_PREFIX_PATH}" \
            \
            -DLibArchive_VERSION="3.8.2" \
            -DLibArchive_INCLUDE_DIR="$(brew --prefix libarchive)/include" \
            -DLibArchive_LIBRARIES="$(brew --prefix libarchive)/lib/libarchive.dylib" \
            \
            -DLIBXML2_INCLUDE_DIR="$(brew --prefix libxml2)/include/libxml2" \
            -DLIBXML2_LIBRARIES="$(brew --prefix libxml2)/lib/libxml2.dylib" \
            \
            -DLIBXSLT_INCLUDE_DIR="$(brew --prefix libxslt)/include" \
            -DLIBXSLT_LIBRARIES="$(brew --prefix libxslt)/lib/libxslt.dylib" \
            \
            -DCURL_INCLUDE_DIR="$(brew --prefix curl)/include" \
            -DCURL_LIBRARIES="$(brew --prefix curl)/lib/libcurl.dylib"

      - name: Install vcpkg and libxml2 on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          # Clone vcpkg only if it doesn't already exist
          if (-not (Test-Path 'C:\vcpkg')) {
            git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          } else {
            Write-Host "C:\vcpkg already exists, skipping git clone."
          }

          # Bootstrap vcpkg (download vcpkg.exe if necessary).
          if (-not (Test-Path 'C:\vcpkg\vcpkg.exe')) {
            & 'C:\vcpkg\bootstrap-vcpkg.bat'
          } else {
            Write-Host "vcpkg.exe present, skipping bootstrap."
          }

          # Expose VCPKG_ROOT for later steps
          "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding ASCII -Append

          # Do not pass individual package names in manifest mode.
          if (Test-Path "$PWD\vcpkg.json") {
            Write-Host "vcpkg.json detected in repo — using manifest mode. Installing triplet..."
            & 'C:\vcpkg\vcpkg.exe' install --triplet x64-windows
          } else {
            Write-Host "No vcpkg.json found — installing specific ports."
            & 'C:\vcpkg\vcpkg.exe' install libxml2:x64-windows libarchive:x64-windows openssl:x64-windows zlib:x64-windows
          }

      - name: Build on Windows
        shell: bash
        if: ${{ matrix.os == 'windows-latest' }}
        working-directory: build
        run: |
          # export UseMultiToolTask=true
          # Use the vcpkg toolchain so CMake can find libxml2 and other deps installed via vcpkg.
          cmake ../ --preset ci-msvc -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build . --config Release --target install

      - name: Build and Install on Ubuntu/macOS
        shell: bash
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          sudo cmake --build build --verbose --config Release --target install

      - name: Finish install for Ubuntu
        shell: bash
        if: ${{ matrix.os == 'ubuntu-latest' }}
        working-directory: build
        run: |
          sudo ldconfig

      - name: Setup msys2 with additional client-test packages for Windows
        if: ${{ matrix.os == 'windows-latest' }}
        uses: msys2/setup-msys2@v2
        with:
          install: >-
            zip
            cpio
            diffutils
            cmake
            util-linux

      - name: Windows Client Tests on Installed srcml
        if: ${{ matrix.os == 'windows-latest' }}
        shell: msys2 {0}
        working-directory: build
        timeout-minutes: 5
        continue-on-error: true
        run: |
          export SRCML_HOME="/c/Program Files (x86)/srcML/bin"
          ctest -C Release -VV
      - uses: actions/upload-artifact@v4
        with:
          name: ClientLastTest.${{ runner.os }}.log
          path: build/Testing/Temporary/LastTest.log

      - name: Ubuntu/macOS Client Tests on Installed srcml
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        working-directory: build
        run: |
          # --- Set up the environment variables ---
          export TEST_PATH="$PATH"
          export TEST_CMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH"
          
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            # Prepend all brew and system paths
            export TEST_PATH="/opt/homebrew/opt/gnu-tar/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin:$TEST_PATH"
            export TEST_CMAKE_PREFIX_PATH="/opt/homebrew/opt/gnu-tar:$TEST_CMAKE_PREFIX_PATH"
          else
            # For Ubuntu, just add the install path
            export TEST_PATH="/usr/local/bin:$TEST_PATH"
          fi
          
          # --- DEBUGGING ---
          echo "Using PATH: $TEST_PATH"
          echo "---"
          echo "Which gzip: $(PATH=$TEST_PATH which gzip)"
          echo "Which bzip2: $(PATH=$TEST_PATH which bzip2)"
          echo "Which cpio: $(PATH=$TEST_PATH which cpio)"
          echo "Which tar: $(PATH=$TEST_PATH which tar)"
          echo "Which gtar: $(PATH=$TEST_PATH which gtar)"
          echo "Which srcml: $(PATH=$TEST_PATH which srcml)"
          echo "---"
          # --- END DEBUGGING ---
          
          # Run ctest with the fully constructed environment
          # This is the key change: passing the vars on the same line
          PATH=$TEST_PATH \
          CMAKE_PREFIX_PATH=$TEST_CMAKE_PREFIX_PATH \
          ctest -VV --rerun-failed --output-on-failure
        continue-on-error: true
      - uses: actions/upload-artifact@v4
        with:
          name: ClientLastTest.${{ runner.os }}.log
          path: build/Testing/Temporary/LastTest.log

      - name: Setup tmate session
        if: ${{ matrix.os == 'macos-latest' && !steps.cache.outputs.cache-hit }}
        uses: mxschmitt/action-tmate@v3
