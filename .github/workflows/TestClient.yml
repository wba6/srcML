---
name: Test Client

on: workflow_dispatch

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      # - name: Cache Build
      #   id: cache
      #   uses: actions/cache@v4
      #   with:
      #     path: build
      #     key: ${{ runner.os }}-client1

      - name: Setup Ubuntu
        shell: bash
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt update
          sudo apt install curl zip g++ make ninja-build antlr libantlr-dev \
                           libxml2-dev libxml2-utils libxslt1-dev \
                           libarchive-dev libssl-dev libcurl4-openssl-dev \
                           cpio man file dpkg-dev

      - name: Setup macOS
        shell: bash
        if: ${{ matrix.os == 'macos-latest' }}
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer
          xcodebuild -version
          xcrun --sdk macosx --show-sdk-path
          brew update
          brew reinstall ninja
          brew install libxml2 libxslt antlr

      - name: Setup Windows
        uses: microsoft/setup-msbuild@v1
        if: ${{ matrix.os == 'windows-latest' }}

      - name: Create build directory
        shell: bash
        if: ${{ !steps.cache.outputs.cache-hit }}
        run: mkdir build

      - name: Configure on Ubuntu
        shell: bash
        if: ${{ matrix.os == 'ubuntu-latest' && !steps.cache.outputs.cache-hit }}
        run: |
          cmake --preset ci-ubuntu -B build

      - name: Configure on macOS
        shell: bash
        if: ${{ matrix.os == 'macos-latest' && !steps.cache.outputs.cache-hit }}
        run: |
          unset CPATH C_INCLUDE_PATH CPLUS_INCLUDE_PATH SDKROOT DEVELOPER_DIR PKG_CONFIG_PATH

          # Discover paths
          export HOMEBREW_PREFIX="$(brew --prefix)"
          export DEVELOPER_DIR="$(xcode-select -p)"
          export SDKROOT="$(xcrun --sdk macosx --show-sdk-path)"

          # Use Apple Clang from Xcode
          export CC=/usr/bin/clang
          export CXX=/usr/bin/clang++

          # Configure CMake to use Homebrew libs (matches your local box)
          cmake -S . -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_SYSROOT="${SDKROOT}" \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0 \
            -DCMAKE_C_COMPILER="${CC}" \
            -DCMAKE_CXX_COMPILER="${CXX}" \
            -DCMAKE_PREFIX_PATH="${HOMEBREW_PREFIX}" \
            -DLibXml2_INCLUDE_DIR="${HOMEBREW_PREFIX}/include/libxml2" \
            -DLibXml2_LIBRARY="${HOMEBREW_PREFIX}/lib/libxml2.dylib" \
            -DLIBXSLT_INCLUDE_DIR="${HOMEBREW_PREFIX}/include/libxslt" \
            -DLIBXSLT_LIBRARIES="${HOMEBREW_PREFIX}/lib/libxslt.dylib" \
            -DLIBARCHIVE_INCLUDE_DIR="${HOMEBREW_PREFIX}/include" \
            -DLIBARCHIVE_LIBRARY="${HOMEBREW_PREFIX}/lib/libarchive.dylib"
#          cmake --preset ci-macos -B build

      - name: Install vcpkg and libxml2 on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          # Clone vcpkg only if it doesn't already exist
          if (-not (Test-Path 'C:\vcpkg')) {
            git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          } else {
            Write-Host "C:\vcpkg already exists, skipping git clone."
          }

          # Bootstrap vcpkg (download vcpkg.exe if necessary).
          if (-not (Test-Path 'C:\vcpkg\vcpkg.exe')) {
            & 'C:\vcpkg\bootstrap-vcpkg.bat'
          } else {
            Write-Host "vcpkg.exe present, skipping bootstrap."
          }

          # Expose VCPKG_ROOT for later steps
          "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding ASCII -Append

          # Do not pass individual package names in manifest mode.
          if (Test-Path "$PWD\vcpkg.json") {
            Write-Host "vcpkg.json detected in repo — using manifest mode. Installing triplet..."
            & 'C:\vcpkg\vcpkg.exe' install --triplet x64-windows
          } else {
            Write-Host "No vcpkg.json found — installing specific ports."
            & 'C:\vcpkg\vcpkg.exe' install libxml2:x64-windows libarchive:x64-windows openssl:x64-windows zlib:x64-windows
          }

      - name: Build on Windows
        shell: bash
        if: ${{ matrix.os == 'windows-latest' }}
        working-directory: build
        run: |
          # export UseMultiToolTask=true
          # Use the vcpkg toolchain so CMake can find libxml2 and other deps installed via vcpkg.
          cmake ../ --preset ci-msvc -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake"
          cmake --build . --config Release --target install

      - name: Build and Install on Ubuntu/macOS
        shell: bash
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          sudo cmake --build build --verbose --config Release --target install

      - name: Finish install for Ubuntu
        shell: bash
        if: ${{ matrix.os == 'ubuntu-latest' }}
        working-directory: build
        run: |
          sudo ldconfig

      - name: Setup msys2 with additional client-test packages for Windows
        if: ${{ matrix.os == 'windows-latest' }}
        uses: msys2/setup-msys2@v2
        with:
          install: >-
            zip
            cpio
            diffutils
            cmake
            util-linux

      - name: Windows Client Tests on Installed srcml
        if: ${{ matrix.os == 'windows-latest' }}
        shell: msys2 {0}
        working-directory: build
        timeout-minutes: 5
        continue-on-error: true
        run: |
          export SRCML_HOME="/c/Program Files (x86)/srcML/bin"
          ctest -C Release -VV
      - uses: actions/upload-artifact@v4
        with:
          name: ClientLastTest.${{ runner.os }}.log
          path: build/Testing/Temporary/LastTest.log

      - name: Ubuntu/macOS Client Tests on Installed srcml
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        working-directory: build
        run: |
          ctest -VV
      - uses: actions/upload-artifact@v4
        with:
          name: ClientLastTest.${{ runner.os }}.log
          path: build/Testing/Temporary/LastTest.log

