---
name: Test Client

on: workflow_dispatch

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      # - name: Cache Build
      #   id: cache
      #   uses: actions/cache@v4
      #   with:
      #     path: build
      #     key: ${{ runner.os }}-client1

      - name: Setup Ubuntu
        shell: bash
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          sudo apt update
          sudo apt install curl zip g++ make ninja-build antlr libantlr-dev \
                           libxml2-dev libxml2-utils libxslt1-dev \
                           libarchive-dev libssl-dev libcurl4-openssl-dev \
                           cpio man file dpkg-dev
                           
      - name: Setup macOS
        shell: bash
        if: ${{ matrix.os == 'macos-latest' }}
        run: |
          brew update
          brew install antlr

      - name: Use the Command Line Tools
        if: ${{ matrix.os == 'macos-latest' }}
        run: |
          sudo xcode-select -s /Library/Developer/CommandLineTools

      - name: Setup Windows
        uses: microsoft/setup-msbuild@v1
        if: ${{ matrix.os == 'windows-latest' }}

      - name: Create build directory
        shell: bash
        if: ${{ !steps.cache.outputs.cache-hit }}
        run: mkdir build

      - name: Configure on Ubuntu
        shell: bash
        if: ${{ matrix.os == 'ubuntu-latest' && !steps.cache.outputs.cache-hit }}
        run: |
          cmake --preset ci-ubuntu -B build
          
      - name: Configure on macOS
        shell: bash
        if: ${{ matrix.os == 'macos-latest' && !steps.cache.outputs.cache-hit }}
        run: |
          cmake --preset ci-macos -B build

      - name: Cache vcpkg and installed libraries
        if: ${{ matrix.os == 'windows-latest' }}
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          # Cache both the vcpkg tool AND the local library installation
          path: |
            C:\vcpkg
            ${{ github.workspace }}\vcpkg_installed
          key: vcpkg-${{ runner.os }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-

      - name: Setup vcpkg Environment
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          "VCPKG_ROOT=C:\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Encoding ASCII -Append
          # Add the LOCAL manifest bin directory to PATH
          "$env:GITHUB_WORKSPACE\vcpkg_installed\x64-windows\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding ASCII -Append

      - name: Install vcpkg and libxml2 on Windows
        if: ${{ matrix.os == 'windows-latest' && steps.cache-vcpkg.outputs.cache-hit != 'true' }}
        shell: pwsh
        run: |
          if (-not (Test-Path 'C:\vcpkg')) {
            git clone https://github.com/microsoft/vcpkg.git C:\vcpkg
          }
          if (-not (Test-Path 'C:\vcpkg\vcpkg.exe')) {
            & 'C:\vcpkg\bootstrap-vcpkg.bat'
          }
          # Install using the manifest (vcpkg.json)
          if (Test-Path "vcpkg.json") {
            Write-Host "Manifest mode detected. Installing..."
            & 'C:\vcpkg\vcpkg.exe' install --triplet x64-windows
          }

      - name: Build on Windows
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        working-directory: build
        run: |
          # Use $env:VCPKG_ROOT for PowerShell
          cmake ../ --preset ci-msvc "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" -DCMAKE_INSTALL_PREFIX="C:/srcML"
          cmake --build . --config Release --target install --verbose
          
      - name: Copy DLLs to Release Directory
        if: ${{ matrix.os == 'windows-latest' }}
        shell: pwsh
        run: |
          # Define the source path for Manifest Mode (local to workspace)
          $VcpkgBin = "$env:GITHUB_WORKSPACE\vcpkg_installed\x64-windows\bin"
          $Dest = "build\bin\Release"
          
          # Check if the directory exists to avoid the "Cannot find path" error
          if (Test-Path $VcpkgBin) {
              Write-Host "Found vcpkg binaries at: $VcpkgBin"
              Copy-Item "$VcpkgBin\*.dll" -Destination "$Dest" -Force
              Write-Host "Successfully copied DLLs to $Dest"
          } else {
              # Fallback: Try the global path just in case, but warn
              Write-Warning "Local vcpkg bin not found. Checking global path..."
              if (Test-Path "C:\vcpkg\installed\x64-windows\bin") {
                  Copy-Item "C:\vcpkg\installed\x64-windows\bin\*.dll" -Destination "$Dest" -Force
              } else {
                  Write-Error "Could not find vcpkg binaries in local or global locations."
                  exit 1
              }
          }
          
          # 3. Verify the files are there
          Get-ChildItem "$Dest\*.dll" | Select-Object Name
            
      - name: Build and Install on Ubuntu/macOS
        shell: bash
        if: ${{ matrix.os != 'windows-latest' }}
        run: |
          sudo cmake --build build --verbose --config Release --target install

      - name: Finish install for Ubuntu
        shell: bash
        if: ${{ matrix.os == 'ubuntu-latest' }}
        working-directory: build
        run: |
          sudo ldconfig

      - name: Setup msys2 with additional client-test packages for Windows
        if: ${{ matrix.os == 'windows-latest' }}
        uses: msys2/setup-msys2@v2
        with:
          install: >-
            zip
            cpio
            diffutils
            cmake
            util-linux
            libxml2

      - name: Add vcpkg bin to PATH
        run: echo "${{ github.workspace }}/build/vcpkg_installed/x64-windows/bin" >> $GITHUB_PATH
        shell: bash

      - name: Add MSYS2 MinGW binaries to PATH
        if: ${{ matrix.os == 'windows-latest' }}
        shell: bash
        run: |
          # Add msys2 usr/bin to PATH so standard Git Bash can find xmllint, zip, etc.
          echo "C:/msys64/usr/bin" >> $GITHUB_PATH

      - name: Add srcml executable to PATH
        if: runner.os == 'Windows'
        shell: bash
        run: echo "${{ github.workspace }}/build/bin/Release" >> $GITHUB_PATH
            
      - name: Windows Client Tests on Installed srcml
        if: ${{ matrix.os == 'windows-latest' }}
        shell: msys2 {0}        
        env:
          MSYS2_ARG_CONV_EXCL: "*"
        working-directory: build
        timeout-minutes: 5
        continue-on-error: true
        run: |
          # Install native windows dependencies
          pacman -S --noconfirm mingw-w64-x86_64-libxml2 perl

          # Define Paths
          # Use cygpath to ensure Windows compatible paths for CTest
          VCPKG_BIN="/c/vcpkg/installed/x64-windows/bin"
          MINGW_BIN=$(cygpath -m /mingw64/bin)
          MSYS_BIN=$(cygpath -m /usr/bin)
          export SRCML_HOME="/c/srcML"

          # Create a Perl helper script to fix slashes in filename attributes
          cat <<'EOF' > fix_paths.pl
          while (<>) {
            s/filename="([^"]*)"/
              $n = $1;
              $n =~ s!\\!/!g;
              qq{filename="$n"}
            /ge;
            print;
          }
          EOF

          # Create the srcml wrapper script
          REAL_SRCML="$(pwd)/bin/Release/srcml.exe"
          WRAPPER_PATH="$(pwd)/srcml_wrapper"
          
          cat <<WRAPPER > "$WRAPPER_PATH"
          #!/bin/bash
          set -o pipefail
          "$REAL_SRCML" "\$@" | perl "$(pwd)/fix_paths.pl"
          WRAPPER
          
          chmod +x "$WRAPPER_PATH"
          export SRCML_WRAPPER="$WRAPPER_PATH"

          # Setup PATH
          # Prepend MINGW_BIN to ensure the native xmllint.exe is found first
          export PATH="$SRCML_HOME/bin:$VCPKG_BIN:$MINGW_BIN:$MSYS_BIN:$PATH"

          # Patch Test Scripts
          # Replace /dev/stdin with - (stdin for xmllint/srcml)
          sed -i 's|/dev/stdin|-|g' ../test/client/testsuite/*.sh
          # Point tests to use the wrapper instead of the raw executable
          sed -i 's|"\$SRCML_EXE"|"$SRCML_WRAPPER"|g' ../test/client/testsuite/*.sh
          sed -i 's|\$SRCML_EXE |$SRCML_WRAPPER |g' ../test/client/testsuite/*.sh

          # Run Tests
          echo "Running tests with SRCML_WRAPPER=$SRCML_WRAPPER"
          "/c/Program Files/CMake/bin/ctest.exe" -C Release -VV
          
      - uses: actions/upload-artifact@v4
        with:
          name: ClientLastTest.${{ runner.os }}.log
          path: build/Testing/Temporary/LastTest.log

      - name: Ubuntu/macOS Client Tests on Installed srcml
        if: ${{ matrix.os != 'windows-latest' }}
        shell: bash
        working-directory: build
        run: |
          ctest -VV --rerun-failed --output-on-failure
          
      - name: Setup tmate session
        if: ${{ matrix.os == 'windows-latest' }}
        uses: mxschmitt/action-tmate@v3

      - uses: actions/upload-artifact@v4
        with:
          name: ClientLastTest.${{ runner.os }}.log
          path: build/Testing/Temporary/LastTest.log

      - name: Archive test logs and output on failure
        if: ${{ failure() }} # Only run this step if the ctest step failed
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: TestOutputs-${{ runner.os }}
          path: |
            build/Testing/
            build/test/

      # - name: Setup tmate session
      #   if: ${{ matrix.os == 'macos-latest' && !steps.cache.outputs.cache-hit }}
      #   uses: mxschmitt/action-tmate@v3
